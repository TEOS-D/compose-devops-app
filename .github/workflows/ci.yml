name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  repo-sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required project files
        run: |
          test -f README.md
          test -f Dockerfile
          test -f docker-compose.yml
          test -f .env.example
          test -f requirements.txt
          test -f nginx/default.conf

      - name: Check secrets are not tracked
        run: |
          ! git ls-files | grep -E '(^|/)\.env$'
          ! git ls-files | grep -E '\.key$'

  docker-build-check:
    needs: repo-sanity-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build app image
        run: |
          docker build -t compose-devops-app:test .

      - name: Check app image exists
        run: |
          docker images compose-devops-app:test

  docker-compose-smoke-test:
    needs: docker-build-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Create .env file for CI
        run: |
          cp .env.example .env
          echo "APP_SECRET_KEY=ci-fake-secret_1" >> .env

      - name: Create self-signed certificates for CI
        run: |
          mkdir -p nginx/certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout nginx/certs/devops.local.key \
            -out nginx/certs/devops.local.crt \
            -subj "/CN=localhost"

      - name: Validate Docker Compose config
        run: |
          docker compose config

      - name: Build and start services
        run: |
          docker compose up -d --build --scale app-blue=2 --scale app-green=2

      - name: Show running containers
        run: |
          docker compose ps

      - name: Wait for services
        run: |
          sleep 15
          docker compose ps

      - name: Test nginx HTTPS health
        run: |
          curl -k -i https://localhost:8443/health
          curl -k -s https://localhost:8443/health | grep "nginx is alive over https"

      - name: Test API through nginx
        run: |
          curl -k -i https://localhost:8443/api/
          curl -k -s https://localhost:8443/api/ | grep "App: green"
          curl -k -s https://localhost:8443/api/ | grep "Version: 4.0"

      - name: Test HTTP to HTTPS redirect
        run: |
          curl -k -I http://localhost:8090/api/ | grep "301"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail 100

      - name: Stop services
        if: always()
        run: |
          docker compose down

  docker-publish-ghcr:
    needs: docker-compose-smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "$IMAGE_NAME:latest" .
          docker build -t "$IMAGE_NAME:${GITHUB_SHA}" .

      - name: Push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${GITHUB_SHA}"
