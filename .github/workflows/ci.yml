name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  repo-sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required project files
        run: |
          test -f README.md
          test -f Dockerfile
          test -f docker-compose.yml
          test -f .env.example
          test -f requirements.txt
          test -f nginx/default.conf

      - name: Check secrets are not tracked
        run: |
          ! git ls-files | grep -E '(^|/)\.env$'
          ! git ls-files | grep -E '\.key$'

  docker-build-check:
    needs: repo-sanity-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build app image
        run: |
          docker build -t compose-devops-app:test .

      - name: Check app image exists
        run: |
          docker images compose-devops-app:test

  docker-compose-smoke-test:
    needs: docker-build-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Create .env file for CI
        run: |
          cp .env.example .env
          echo "APP_SECRET_KEY=ci-fake-secret_1" >> .env

      - name: Create self-signed certificates for CI
        run: |
          mkdir -p nginx/certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout nginx/certs/devops.local.key \
            -out nginx/certs/devops.local.crt \
            -subj "/CN=localhost"

      - name: Validate Docker Compose config
        run: |
          docker compose config

      - name: Build and start services
        run: |
          docker compose up -d --build --scale app-blue=2 --scale app-green=2

      - name: Show running containers
        run: |
          docker compose ps

      - name: Wait for services
        run: |
          sleep 15
          docker compose ps

      - name: Test nginx HTTPS health
        run: |
          curl -k -i https://localhost:8443/health
          curl -k -s https://localhost:8443/health | grep "nginx is alive over https"

      - name: Test API through nginx
        run: |
         curl -k -f -s https://localhost:8443/api/ > /tmp/api.html

         grep "TEOS DevOps Lab" /tmp/api.html
         grep "GitHub Actions" /tmp/api.html
         grep "GHCR" /tmp/api.html

         curl -k -f -s https://localhost:8443/api/info > /tmp/api-info.json

         grep '"app"' /tmp/api-info.json
         grep '"green"' /tmp/api-info.json
         grep '"version"' /tmp/api-info.json
         grep '"4.0"' /tmp/api-info.json
         grep '"status"' /tmp/api-info.json
         grep '"ok"' /tmp/api-info.json

      - name: Test HTTP to HTTPS redirect
        run: |
          curl -k -I http://localhost:8090/api/ | grep "301"

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail 100

      - name: Stop services
        if: always()
        run: |
          docker compose down

  docker-publish-ghcr:
    needs: docker-compose-smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "$IMAGE_NAME:latest" .
          docker build -t "$IMAGE_NAME:${GITHUB_SHA}" .

      - name: Push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${GITHUB_SHA}"

  deploy-to-server:
    needs: docker-publish-ghcr
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'EOF'
          set -e

          cd /opt/compose-devops-app

          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps

          curl -fsS http://localhost/health
          curl -fsS http://localhost/api/ | grep "App:"
          EOF
