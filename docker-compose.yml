services:
  app-blue:
    build: .
    image: devops-app-compose:${BLUE_VERSION}
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.50"
    volumes:
      - app_blue_data:/app/data
    environment:
      APP_NAME: ${BLUE_APP_NAME}
      APP_VERSION: ${BLUE_VERSION}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  app-green:
    build: .
    image: devops-app-compose:${GREEN_VERSION}
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.50"
    volumes:
      - app_green_data:/app/data
    environment:
      APP_NAME: ${GREEN_APP_NAME}
      APP_VERSION: ${GREEN_VERSION}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx
    container_name: compose-nginx
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.50"
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/static:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
       app-blue:
        condition: service_healthy
       app-green:
        condition: service_healthy

volumes:
  app_blue_data:
  app_green_data:
